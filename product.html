<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Arena | Auction</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- SockJS & Stomp -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        .arena-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            height: calc(100vh - 64px);
        }
        .asset-view {
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .bidding-engine {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .control-panel {
            background: var(--surface-card);
            border: 1px solid var(--border-vivid);
            padding: 32px;
            border-radius: var(--radius-md);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .bid-stream {
            flex: 1;
            background: var(--surface-mid);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .stream-header {
            padding: 12px 16px;
            background: var(--surface-high);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border-subtle);
        }
        .history-list {
            overflow-y: auto;
        }
        .quick-increment {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-vivid);
            color: var(--text-base);
            padding: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-ghost:hover {
            color: var(--text-vivid);
            border-color: var(--text-vivid);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand-identity">
                <img src="auction_logo.png" class="brand-icon" style="background:none; object-fit: cover;">
                AUCTION
            </div>
            <nav class="nav-links">
                <button class="nav-item" onclick="window.location.href='home.html'">
                    <span>📊</span> Live Market
                </button>
                <button class="nav-item" id="myWinsLink">
                    <span>🏆</span> My Winning Bids
                </button>
                <button class="nav-item" id="myAuctionsLink">
                    <span>📦</span> My Listings
                </button>
                <div style="margin-top: 20px; padding: 0 16px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Account</div>
                <button class="nav-item" onclick="logout()">
                    <span>🚪</span> Sign Out
                </button>
            </nav>
            <div style="margin-top: auto; padding: 16px; background: var(--surface-mid); border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);">
                <div id="userNameDisplay" style="font-size: 13px; font-weight: 600; color: var(--text-vivid);">USER</div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-viewport">
            
            <div class="arena-layout">
                
                <!-- LEFT: PRODUCT VIEW -->
                <div class="asset-view">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <button class="nav-item" onclick="window.location.href='home.html'" style="padding-left: 0;">← Back to Market</button>
                        <div id="bidStatus" style="display: none; padding: 4px 12px; font-size: 11px; font-weight: 800; border-radius: 2px;">STATUS</div>
                    </div>

                    <div style="height: 300px; background: #000; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-subtle);">
                        <span style="font-size: 80px; opacity: 0.1;">📦</span>
                    </div>

                    <div>
                        <h1 id="pName" style="font-size: 32px; font-weight: 800; color: var(--text-vivid); margin-bottom: 12px; letter-spacing: -0.02em;">Loading Asset...</h1>
                        <p style="color: var(--text-base); font-size: 15px; max-width: 600px;">
                            This asset is verified by Auction Market. Real-time bidding is active. 
                            Ensure you have sufficient balance before placing a bid.
                        </p>
                    </div>
                </div>

                <!-- RIGHT: BIDDING ENGINE -->
                <div class="bidding-engine">
                    
                    <!-- THE ENGINE -->
                    <div class="control-panel">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
                            <div>
                                <div class="price-label" style="font-size: 12px;">Current Bid</div>
                                <div id="pPrice" class="current-price" style="font-size: 40px;">₹ 0</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="price-label" style="font-size: 12px;">Ending In</div>
                                <div id="pTimer" class="timer-value" style="font-size: 20px;">00:00:00</div>
                            </div>
                        </div>

                        <div id="bidFormContainer">
                            <div class="input-group">
                                <label class="input-label">Enter Your Bid</label>
                                <div style="position: relative;">
                                    <span style="position: absolute; left: 16px; top: 12px; color: var(--text-muted); font-family: var(--font-data);">₹</span>
                                    <input type="number" id="bidAmount" class="auction-input" style="padding-left: 32px; font-family: var(--font-data); font-size: 18px; font-weight: 700;">
                                </div>
                                <div id="minBidHint" style="font-size: 10px; color: var(--text-muted); margin-top: 10px; text-transform: uppercase; letter-spacing: 0.05em;"></div>
                            </div>

                            <button onclick="placeBid()" class="btn-action" style="height: 56px; background: var(--accent-emerald); color: #fff; border: none; font-size: 16px;">Confirm Bid</button>
                            
                            <div class="quick-increment">
                                <button class="btn-ghost" onclick="document.getElementById('bidAmount').value = parseInt(document.getElementById('bidAmount').value || 0) + 100">+ ₹100</button>
                                <button class="btn-ghost" onclick="document.getElementById('bidAmount').value = parseInt(document.getElementById('bidAmount').value || 0) + 500">+ ₹500</button>
                            </div>
                        </div>
                    </div>

                    <!-- BID STREAM -->
                    <div class="bid-stream">
                        <div class="stream-header">Live Bid Activity</div>
                        <div id="bidHistoryList" class="history-list">
                            <div style="padding: 40px; text-align: center; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Awaiting Bids...</div>
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <div id="toast-container"></div>
    
    <!-- DRAMATIC FINAL COUNTDOWN OVERLAY -->
    <div id="finalCountdownOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, rgba(5,5,5,0.95) 100%); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(12px);">
        <div style="font-size: 28px; color: var(--text-vivid); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 20px; font-weight: 600;">Auction Closing In</div>
        <div id="finalCountdownText" style="font-size: 200px; font-weight: 800; color: var(--accent-rose); font-family: var(--font-data); line-height: 1; text-shadow: 0 0 60px rgba(239,68,68,0.6); animation: heartbeat 1s infinite;">10</div>
        <div style="margin-top: 40px; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">Final Chance To Act</div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
